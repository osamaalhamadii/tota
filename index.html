<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Tota's Surprise</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #ffe6ea; padding-top: 50px; }
        #yesBtn { padding: 20px 40px; font-size: 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; transition: 0.3s; }
        #noBtn { padding: 10px 20px; font-size: 16px; background-color: #f44336; color: white; border: none; cursor: pointer; }
        .gifts-container { display: none; margin-top: 30px; }
        .gift-box { font-size: 60px; cursor: pointer; margin: 20px; display: inline-block; transition: transform 0.2s; }
        .gift-box:hover { transform: scale(1.2); }
        #player-container { margin-top: 30px; }
        .message { font-size: 24px; color: #d81b60; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="main-content">
        <h1>Tota, Do you love me? ❤️</h1>
        <button id="yesBtn" onclick="showGifts()">YES</button>
        <button id="noBtn" onclick="reject()">No</button>
    </div>

    <div id="gift-content" class="gifts-container">
        <h2>I knew you'd say yes 💕</h2>
        <div class="gift-box" onclick="playSong('r99RZ4ViteM')">🎁</div>
        <div class="gift-box" onclick="playSong('flwBjaFnk_c')">🎁</div>
        <div class="gift-box" onclick="playSong('TJecOeoWf3I')">🎁</div>
        
        <div id="player-container"></div>
        <p id="myMessage" class="message" style="display:none;">وعد بحطج بعيوني بس انتي قرري</p>
    </div>

    <script>
        let count = 0;
        function reject() {
            count++;
            document.getElementById('yesBtn').style.fontSize = (20 + (count * 20)) + "px";
            if(count >= 4) document.getElementById('noBtn').style.display = "none";
        }
        function showGifts() {
            document.getElementById('main-content').style.display = "none";
            document.getElementById('gift-content').style.display = "block";
        }
        function playSong(id) {
            document.getElementById('player-container').innerHTML = 
            `<iframe width="320" height="200" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            // إظهار الجملة بعد اختيار الأغنية
            document.getElementById('myMessage').style.display = "block";
        }
    </script>
</body>
</html>
